<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Smart Ration Shop Illustration</title>
  <desc id="desc">An illustrated ration shop building with grain bags and inventory boxes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c496f"/>
      <stop offset="100%" stop-color="#0a2340"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5cc58"/>
      <stop offset="100%" stop-color="#f39d3c"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22496d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a3b5e" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="90" fill="#4de0c1" fill-opacity="0.22"/>
  <circle cx="1030" cy="90" r="78" fill="#ffd36f" fill-opacity="0.22"/>
  <rect y="450" width="1200" height="190" fill="url(#floor)"/>

  <rect x="300" y="210" width="600" height="260" rx="18" fill="#f6fbff"/>
  <rect x="280" y="180" width="640" height="62" rx="14" fill="url(#roof)"/>
  <rect x="450" y="290" width="110" height="180" fill="#2d4f70"/>
  <rect x="640" y="290" width="110" height="180" fill="#2d4f70"/>
  <rect x="340" y="270" width="70" height="70" rx="8" fill="#b5d7f2"/>
  <rect x="790" y="270" width="70" height="70" rx="8" fill="#b5d7f2"/>

  <rect x="505" y="160" width="190" height="44" rx="10" fill="#153754"/>
  <text x="600" y="188" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#f4fbff">
    RATION SHOP
  </text>

  <g transform="translate(125,390)">
    <rect x="0" y="38" width="130" height="84" rx="8" fill="#d89d51"/>
    <rect x="28" y="0" width="130" height="122" rx="8" fill="#f0bc6a"/>
    <text x="93" y="70" text-anchor="middle" font-family="Verdana, sans-serif" font-size="24" font-weight="700" fill="#7b4d1f">RICE</text>
  </g>

  <g transform="translate(910,396)">
    <rect x="0" y="20" width="170" height="102" rx="12" fill="#76bad0"/>
    <rect x="20" y="0" width="170" height="122" rx="12" fill="#9ed9ea"/>
    <text x="105" y="72" text-anchor="middle" font-family="Verdana, sans-serif" font-size="24" font-weight="700" fill="#184766">STOCK</text>
  </g>

  <g transform="translate(500,510)">
    <rect x="0" y="0" width="200" height="16" rx="8" fill="#4de0c1" fill-opacity="0.45"/>
    <rect x="15" y="26" width="170" height="12" rx="6" fill="#ffd36f" fill-opacity="0.5"/>
  </g>
</svg>
