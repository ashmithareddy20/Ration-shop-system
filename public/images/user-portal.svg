<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="title desc">
  <title id="title">User Portal Illustration</title>
  <desc id="desc">User checking ration card and monthly allocation in a dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#184976"/>
      <stop offset="100%" stop-color="#0d2f50"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#e2f0ff"/>
    </linearGradient>
  </defs>
  <rect width="720" height="480" rx="26" fill="url(#bg)"/>
  <circle cx="96" cy="86" r="58" fill="#47dcc0" fill-opacity="0.28"/>
  <circle cx="632" cy="68" r="48" fill="#ffd275" fill-opacity="0.26"/>

  <rect x="92" y="92" width="536" height="294" rx="18" fill="url(#card)"/>
  <rect x="92" y="92" width="536" height="52" rx="18" fill="#6eb4e6"/>
  <text x="130" y="126" font-family="Verdana, sans-serif" font-size="22" font-weight="700" fill="#f7fdff">Beneficiary Dashboard</text>

  <circle cx="170" cy="214" r="40" fill="#2d5e86"/>
  <rect x="126" y="257" width="88" height="74" rx="14" fill="#2d5e86"/>

  <rect x="258" y="182" width="316" height="46" rx="10" fill="#dcecff"/>
  <rect x="258" y="244" width="280" height="34" rx="9" fill="#dcecff"/>
  <rect x="258" y="292" width="220" height="30" rx="9" fill="#dcecff"/>

  <rect x="258" y="338" width="170" height="30" rx="15" fill="#f8c34d"/>
  <text x="343" y="359" text-anchor="middle" font-family="Verdana, sans-serif" font-size="16" font-weight="700" fill="#4b330b">Place Order</text>
</svg>
